# RAG Search Configuration
# Number of top similar chunks to retrieve (higher = more context but slower)
rag.search.top-k=15
# Maximum cosine distance threshold (0.0 = exact match, 1.0 = no filtering)
# Chunks with distance > this value are filtered out as irrelevant
rag.search.max-distance=0.75
