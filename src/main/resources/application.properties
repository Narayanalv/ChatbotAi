# Groq Chat (uses OpenAI-compatible protocol — requests go to api.groq.com, NOT openai.com)
spring.ai.openai.api-key=${GROQ_API_KEY:}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=meta-llama/llama-4-scout-17b-16e-instruct
spring.ai.openai.embedding.enabled=false

# Disable OpenAI embedding auto-config (prevents duplicate EmbeddingModel bean conflict)
spring.autoconfigure.exclude=org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration

# Google GenAI - for embeddings only (Groq doesn't offer embeddings)

spring.ai.google.genai.api-key=${GOOGLE_GENAI_API_KEY:}
spring.ai.google.genai.embedding.api-key=${GOOGLE_GENAI_API_KEY:}
spring.ai.google.genai.embedding.text.options.model=gemini-embedding-001

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

